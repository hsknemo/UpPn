[build]
command = "npm run build"
publish = "dist"

[dev]
command = "npm run dev"
port = 5173
framework = "vite"

[headers]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[redirects]
from = "/*"
to = "/index.html"
status = 200
